name: Build UQM with Conan and CMake

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        build_type: [Debug, Release]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Setup Visual Studio Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
    
    - name: Install Ninja
      run: choco install ninja
    
    - name: Install Conan
      run: |
        pip install conan
        conan --version

    - name: Detect Conan Profile
      run: conan profile detect --force
    
    - name: Install Dependencies with Conan
      run: |
        conan install . `
          -of conanbuild `
          --build=missing `
          -s build_type=${{ matrix.build_type }}
    
    - name: Configure CMake
      run: |
        cmake -G Ninja -B conanbuild `
          -DCMAKE_TOOLCHAIN_FILE="conanbuild/build/${{ matrix.build_type }}/generators/conan_toolchain.cmake" `
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
    
    - name: Build
      run: cmake --build conanbuild --config ${{ matrix.build_type }}
    
    - name: Run Unit Tests
      run: |
        cd conanbuild
        ctest --output-on-failure --build-config ${{ matrix.build_type }}
    
    - name: Collect DLLs
      shell: bash
      run: |
        mkdir -p artifact
        cp conanbuild/UrQuanMasters.exe artifact/ || true
        cp conanbuild/*.dll artifact/ || true
    
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UrQuanMasters-Windows-${{ matrix.build_type }}
        path: artifact/
        if-no-files-found: error
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-Windows-${{ matrix.build_type }}
        path: conanbuild/Testing/
        if-no-files-found: ignore

